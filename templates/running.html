{% extends "base.html" %}
{% block content %}

<section class="view-header">
  <h2 id="title">Working…</h2>
  <p class="dim" id="message">Starting…</p>
  <p class="dim small" id="elapsed">0s elapsed</p>
</section>

<section class="progress-panel">
  <pre id="log" class="log-box">Loading…</pre>
</section>

<script>
const start = Date.now();
async function tick() {
  try {
    const r = await fetch("/api/progress");
    const s = await r.json();
    document.getElementById("title").textContent = (
      s.task === "onboard+discover" ? "Setting up your feed…"
      : s.task === "discover"        ? "Discovering items…"
      : s.task === "rerank"          ? "Re-ranking with your edits…"
      : "Working…"
    );
    document.getElementById("message").textContent = s.message || "…";
    document.getElementById("log").textContent = (s.log || []).slice(-300).join("\n");
    document.getElementById("log").scrollTop = 1e9;
    document.getElementById("elapsed").textContent = Math.round((Date.now()-start)/1000) + "s elapsed";
    if (s.status === "done") {
      setTimeout(() => { window.location.href = s.redirect_to || "/feed"; }, 600);
      return;
    }
    if (s.status === "error") {
      document.getElementById("title").textContent = "Error";
      document.getElementById("message").textContent = s.message;
      return;
    }
  } catch (e) {}
  setTimeout(tick, 1000);
}
tick();
</script>
{% endblock %}
