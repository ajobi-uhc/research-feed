<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ view_title or "Safety Feed" }} · Safety Feed</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <div class="bar">
    <h1><a href="/">Safety Feed</a></h1>
    <nav>
      <a href="/weeks" class="{{ 'active' if view in ('weeks', 'week') else '' }}">Weeks</a>
      <a href="/profile" class="{{ 'active' if view == 'profile' else '' }}">Profile</a>
    </nav>
  </div>
</header>

<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
